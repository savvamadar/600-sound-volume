<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="popup.css" rel="stylesheet">
    <title>600% Sound Volume</title>
</head>
<body>
<noscript><strong>We're sorry but popup doesn't work properly without JavaScript enabled. Please enable it to continue.</strong></noscript>
<header class="header">
    <h1 class="header__name" id="header-title">600% Sound Volume</h1>
    <p class="header__description" id="header-description">Control volume of the current tab with the slider below. Switch to any tab playing audio with just one click.</p>
</header>
<section class="notification" id="notification">
    <button class="notification__close" id="notification-close" tabindex="-1">×</button>
    <div class="notification__title" id="notification-title"></div>
    <div class="notification__message" id="notification-message"></div>
</section>
<section class="volume-slider">
    <button id="btn-mute"><img src="mute.png" alt="mute"></button>
    <button id="btn-100">💯</button>
    <span class="volume-slider__boost-msg" id="boost-msg" style="display:none"></span>
    <input type="range" id="volume-slider" class="volume-slider__slider" min="0" max="600" step="10" value="100" autofocus>
</section>
<section class="volume-info">
    <span class="volume-info__volume-min">0 %</span>
    <span class="volume-info__volume-current" id="volume-current">Volume: 100 %</span>
    <span class="volume-info__volume-max">600 %</span>
</section>
<section class="tabs">
    <div class="tabs__title" id="tabs-title">Tabs playing audio right now</div>
    <div id="tabs-list"></div>
</section>
<footer style="width:100%">
    <span style="float:left"><a href="https://github.com/savvamadar/600-sound-volume/" target="_blank" rel="noopener">GitHub</a></span>
</footer>
<script src="js/popup.js"></script>
</body>
</html>
